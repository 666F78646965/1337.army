<!DOCTYPE html>
<html lang="🖕">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1337///ARMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Sportscenter';
            src: url('https://cdn.jsdelivr.net/gh/666F78646965/1337.army@main/sportscenter.ttf') format('truetype');
            font-display: swap;
        }
        :root {
            --bg-color: #050505;
            --text-color: #eaeaea;
            --wrapper-bg: rgba(255, 255, 255, 0.02);
            --wrapper-border: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.05);
        }
        body[data-theme="light"] {
            --bg-color: #eaeaea;
            --text-color: #050505;
            --wrapper-bg: rgba(0, 0, 0, 0.02);
            --wrapper-border: rgba(0, 0, 0, 0.05);
            --input-bg: rgba(0, 0, 0, 0.05);
        }
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Sportscenter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
        }
        .title {
            font-size: 4rem;
            margin: 0 0 30px 0;
            font-weight: 700;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
        }
        @media (max-width: 600px) {
            .title {
                font-size: 2.5rem;
            }
        }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--text-color);
            margin: 0 16px;
            animation: blink 1s step-start infinite;
        }
        @media (max-width: 600px) {
            .cursor {
                width: 6px;
                height: 6px;
                margin: 0 10px;
            }
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .binary-wrapper {
            width: 100%;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: var(--wrapper-bg);
            border: 1px solid var(--wrapper-border);
            border-radius: 8px;
            padding: 20px;
        }
        .binary-text {
            font-family: 'Fira Code', 'Courier New', Courier, monospace !important;
            font-size: 1.1rem;
            letter-spacing: 2px;
            word-break: break-all;
            overflow-wrap: break-word;
            white-space: normal;
            max-width: 100%;
            color: #888;
            user-select: all;
            -webkit-user-select: all;
            -moz-user-select: all;
            -ms-user-select: all;
        }
        .copy-btn {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 10px 24px;
            font-family: 'Sportscenter', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .copy-btn:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
        .payment-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            background: var(--wrapper-bg);
            border: 1px solid var(--wrapper-border);
            border-radius: 8px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
        }
        .qr-container {
            background: #ffffff;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .qr-container:hover {
            transform: scale(1.02);
        }
        .slider-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .slider-container input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: var(--wrapper-border);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--text-color);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        .input-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        .input-container input[type="number"] {
            font-family: 'Fira Code', monospace !important;
            background: var(--input-bg);
            border: 1px solid var(--wrapper-border);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 1.1rem;
            width: 140px;
            text-align: center;
            outline: none;
        }
        .input-container input[type="number"]::-webkit-inner-spin-button,
        .input-container input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .currency-label {
            font-family: 'Fira Code', monospace !important;
            font-size: 1.1rem;
            font-weight: 700;
        }
        .tg-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background-color: var(--text-color);
            color: var(--bg-color);
            border: 1px solid var(--text-color);
            padding: 14px 32px;
            font-family: 'Sportscenter', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            text-decoration: none;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }
        .tg-btn:hover {
            background-color: transparent;
            color: var(--text-color);
        }
        .tg-btn svg {
            fill: currentColor;
            width: 20px;
            height: 20px;
            transition: transform 0.2s ease;
        }
        .tg-btn:hover svg {
            transform: scale(1.05);
        }
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: transparent;
            border: 1px solid var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 1000;
        }
        .theme-toggle::before {
            content: '';
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--text-color);
            transition: all 0.2s ease;
        }
        .theme-toggle:hover {
            transform: scale(1.05);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="title">1337<span class="cursor"></span>ARMY</div>
        
        <div class="binary-wrapper">
            <div class="binary-text" id="bText">44fWRr3CjanhJ7rZu7A5py8hnqb4bpk9EFCD8bhRERAHjGrfidnGfP8E7HcrJjiCep6p9y1SZtko5ivAWJmRNet9Ara7JXV</div>
            <button class="copy-btn" id="cBtn" onclick="cp()">COPY</button>
        </div>

        <div class="payment-wrapper">
            <div class="qr-container" id="qrClick" onclick="openWallet()">
                <canvas id="qrCode"></canvas>
            </div>
            <div class="slider-container">
                <input type="range" id="xmrSlider" min="0" max="100" step="0.01" value="0" oninput="handleSlider(this.value)">
                <div class="input-container">
                    <input type="number" id="xmrInput" min="0.05" max="5000" step="0.01" value="0.05" oninput="handleManualInput(this.value)">
                    <span class="currency-label">XMR</span>
                </div>
            </div>
        </div>

        <a href="https://t.me/ARMY1337" class="tg-btn" onclick="tg(event)">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.43 6.75c-.11.5-.41.62-.83.39l-2.18-1.61-1.05 1.01c-.11.11-.22.21-.45.21l.15-2.2 4.01-3.62c.17-.15-.04-.24-.27-.09l-4.96 3.12-2.13-.67c-.46-.14-.47-.46.1-.68l8.33-3.21c.39-.14.72.1.56.61z"/>
            </svg>
            <span>TELEGRAM</span>
        </a>
    </div>

    <button class="theme-toggle" id="tBtn" onclick="tc()"></button>

    <script>
        const minXMR = 0.05;
        const maxXMR = 5000;
        const address = document.getElementById('bText').innerText;
        
        const qr = new QRious({
            element: document.getElementById('qrCode'),
            size: 160,
            level: 'M',
            background: '#ffffff',
            foreground: '#050505'
        });

        function getURI(amount) {
            return `monero:${address}?amount=${amount}`;
        }

        function updateQR(amount) {
            qr.value = getURI(amount);
        }

        function handleSlider(val) {
            const pct = val / 100;
            const amount = minXMR * Math.pow(maxXMR / minXMR, pct);
            const formatted = parseFloat(amount.toFixed(2));
            document.getElementById('xmrInput').value = formatted;
            updateQR(formatted);
        }

        function handleManualInput(val) {
            let amount = parseFloat(val);
            if (isNaN(amount)) return;
            if (amount < minXMR) amount = minXMR;
            if (amount > maxXMR) amount = maxXMR;
            
            const pct = Math.log(amount / minXMR) / Math.log(maxXMR / minXMR);
            document.getElementById('xmrSlider').value = pct * 100;
            updateQR(amount);
        }

        function openWallet() {
            const amount = document.getElementById('xmrInput').value;
            window.location.href = getURI(amount);
        }

        function cp() {
            const t = document.getElementById('bText').innerText;
            const b = document.getElementById('cBtn');
            
            navigator.clipboard.writeText(t).then(() => {
                b.innerText = 'COPIED';
                setTimeout(() => { b.innerText = 'COPY'; }, 2000);
            }).catch(() => {
                const dummy = document.createElement('textarea');
                document.body.appendChild(dummy);
                dummy.value = t;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                b.innerText = 'COPIED';
                setTimeout(() => { b.innerText = 'COPY'; }, 2000);
            });
        }

        function tg(e) {
            e.preventDefault();
            if (confirm("Open Telegram group @ARMY1337?")) {
                window.open("https://t.me/ARMY1337", "_blank");
            }
        }

        function tc() {
            const b = document.body;
            if (b.getAttribute('data-theme') === 'light') {
                b.removeAttribute('data-theme');
            } else {
                b.setAttribute('data-theme', 'light');
            }
        }

        updateQR(minXMR);
    </script>
</body>
</html>
